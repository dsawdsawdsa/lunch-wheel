<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucky Wheel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 讓轉動更順暢、避免抖動 */
      #wheel-rotator {
        will-change: transform;
        transform-origin: 50% 50%;
      }
      .spin-transition {
        transition: transform 4.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-2xl px-4 py-6">
      <header class="mb-5">
        <h1 class="text-2xl font-semibold tracking-tight">幸运轮抽奖</h1>
        <p class="mt-1 text-sm text-slate-300">
          支持新增/删除午餐选项、1% Wildcard 概率，以及「不连续重复」规则。
        </p>
      </header>

      <div class="grid gap-4 md:grid-cols-2">
        <!-- Options -->
        <section class="rounded-2xl border border-white/10 bg-white/5 p-4">
          <h2 class="text-lg font-semibold">午餐选项</h2>

          <form id="add-form" class="mt-3 flex gap-2">
            <input
              id="new-option"
              type="text"
              inputmode="text"
              placeholder="输入午餐选项，例如 KFC / 寿司 / 沙拉"
              class="flex-1 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm outline-none focus:border-indigo-400"
              autocomplete="off"
            />
            <button
              id="add-btn"
              type="submit"
              class="touch-manipulation rounded-xl bg-indigo-500 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400 active:bg-indigo-600"
            >
              加入
            </button>
          </form>

          <div class="mt-3 flex items-center justify-between gap-3">
            <p id="options-count" class="text-sm text-slate-300"></p>
            <button
              id="reset-defaults"
              type="button"
              class="touch-manipulation rounded-xl border border-white/10 bg-white/0 px-3 py-2 text-sm text-slate-200 hover:bg-white/5 active:bg-white/10"
            >
              恢復預設
            </button>
          </div>

          <ul
            id="options-list"
            class="mt-3 max-h-72 overflow-auto rounded-xl border border-white/10 bg-black/20 p-2"
          ></ul>

          <p class="mt-3 text-xs leading-relaxed text-slate-400">
            抽奖规则：Wildcard 固定 1%（奖品：Eat Whatever You Want），其余 99% 在你新增的选项间平均分配。
          </p>
        </section>

        <!-- Wheel -->
        <section class="rounded-2xl border border-white/10 bg-white/5 p-4">
          <h2 class="text-lg font-semibold">抽奖轮盘</h2>

          <div class="mt-3 flex flex-col items-center">
            <div class="relative">
              <!-- Pointer -->
              <div
                class="pointer-events-none absolute -top-2 left-1/2 -translate-x-1/2"
              >
                <div class="h-0 w-0 border-l-[14px] border-r-[14px] border-b-[22px] border-transparent border-b-indigo-400"></div>
              </div>

              <!-- Rotating wheel container -->
              <div class="relative mx-auto w-72 h-72 sm:w-80 sm:h-80">
                <div
                  id="wheel-rotator"
                  class="absolute inset-0 flex items-center justify-center"
                >
                  <canvas
                    id="wheel-canvas"
                    class="h-full w-full"
                  ></canvas>
                </div>

                <!-- Center cap -->
                <div
                  class="absolute left-1/2 top-1/2 h-20 w-20 -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/10 bg-slate-900/70 backdrop-blur flex flex-col items-center justify-center"
                >
                  <div class="text-xs font-semibold text-slate-100">SPIN</div>
                  <div class="text-[10px] text-slate-400">Lucky</div>
                </div>
              </div>
            </div>

            <button
              id="spin-btn"
              class="mt-4 w-full touch-manipulation rounded-2xl bg-indigo-500 px-4 py-3 text-base font-semibold text-white shadow-sm hover:bg-indigo-400 active:bg-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              开始旋转
            </button>

            <div class="mt-3 w-full rounded-xl border border-white/10 bg-black/20 p-3">
              <div class="text-sm font-semibold">上次结果</div>
              <div id="last-result" class="mt-1 text-sm text-slate-200 break-words">
                —
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- Winner Modal -->
    <div
      id="modal"
      class="fixed inset-0 z-50 hidden items-end justify-center bg-black/60 p-4 sm:items-center"
      role="dialog"
      aria-modal="true"
    >
      <div class="w-full max-w-md rounded-2xl border border-white/10 bg-slate-900/95 p-5 shadow-2xl">
        <div class="flex items-center justify-between gap-3">
          <h3 class="text-lg font-semibold">赢家</h3>
          <button
            id="close-modal"
            class="touch-manipulation rounded-xl border border-white/10 bg-white/0 px-3 py-2 text-sm text-slate-200 hover:bg-white/5 active:bg-white/10"
          >
            关闭
          </button>
        </div>
        <p class="mt-3 text-sm text-slate-300">本次结果如下：</p>
        <div id="winner-text" class="mt-2 break-words text-2xl font-semibold text-indigo-200"></div>
      </div>
    </div>

    <script>
      const STORAGE_OPTIONS_KEY = "luckywheel_options_v1";
      const STORAGE_LAST_WINNER_KEY = "luckywheel_last_winner_v1";

      const WILDCARD_LABEL = "Eat Whatever You Want";
      const WILDCARD_PROB = 0.01; // 固定 1%

      const DEFAULT_OPTIONS = ["KFC", "Sushi", "Salad"];

      const canvas = document.getElementById("wheel-canvas");
      const rotator = document.getElementById("wheel-rotator");
      const spinBtn = document.getElementById("spin-btn");
      const optionsList = document.getElementById("options-list");
      const addForm = document.getElementById("add-form");
      const newOptionInput = document.getElementById("new-option");
      const optionsCount = document.getElementById("options-count");
      const resetDefaultsBtn = document.getElementById("reset-defaults");
      const lastResultEl = document.getElementById("last-result");

      const modal = document.getElementById("modal");
      const closeModalBtn = document.getElementById("close-modal");
      const winnerText = document.getElementById("winner-text");

      const ctx = canvas.getContext("2d");

      let options = [];
      let lastWinnerLabel = localStorage.getItem(STORAGE_LAST_WINNER_KEY) || null;
      let currentRotationDeg = 0;
      let isSpinning = false;

      const COLORS = [
        "#6366f1", // indigo
        "#22c55e", // green
        "#f59e0b", // amber
        "#06b6d4", // cyan
        "#ef4444", // red
        "#a855f7", // purple
        "#14b8a6", // teal
      ];

      function normalizeDeg(deg) {
        const x = deg % 360;
        return x < 0 ? x + 360 : x;
      }

      function showModal(text) {
        winnerText.textContent = text;
        modal.classList.remove("hidden");
      }

      function hideModal() {
        modal.classList.add("hidden");
      }

      closeModalBtn.addEventListener("click", hideModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) hideModal();
      });

      function saveOptions() {
        localStorage.setItem(STORAGE_OPTIONS_KEY, JSON.stringify(options));
      }

      function loadOptions() {
        try {
          const raw = localStorage.getItem(STORAGE_OPTIONS_KEY);
          if (!raw) return DEFAULT_OPTIONS.slice();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed) || parsed.length === 0) return DEFAULT_OPTIONS.slice();
          const cleaned = parsed
            .map((x) => String(x).trim())
            .filter(Boolean);
          return cleaned.length ? cleaned : DEFAULT_OPTIONS.slice();
        } catch {
          return DEFAULT_OPTIONS.slice();
        }
      }

      function renderOptions() {
        optionsCount.textContent = `共 ${options.length} 个选项`;
        optionsList.innerHTML = "";

        options.forEach((label, idx) => {
          const li = document.createElement("li");
          li.className =
            "mb-1 flex items-center justify-between gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2";

          const left = document.createElement("div");
          left.className = "min-w-0 flex-1";

          const title = document.createElement("div");
          title.className = "truncate text-sm font-semibold";
          title.textContent = label;

          left.appendChild(title);

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className =
            "touch-manipulation rounded-xl border border-white/10 bg-white/0 px-2 py-1 text-xs text-slate-200 hover:bg-white/5 active:bg-white/10";
          delBtn.textContent = "删除";
          delBtn.addEventListener("click", () => {
            options.splice(idx, 1);
            saveOptions();
            renderOptions();
            drawWheel();
            updateLastResultDisplay();
          });

          li.appendChild(left);
          li.appendChild(delBtn);
          optionsList.appendChild(li);
        });
      }

      function splitTextForArc(text, maxCharsPerLine) {
        // 简單换行：以字数粗略切，避免太长挤出弧形
        if (text.length <= maxCharsPerLine) return [text];
        const out = [];
        let i = 0;
        while (i < text.length) {
          out.push(text.slice(i, i + maxCharsPerLine));
          i += maxCharsPerLine;
        }
        return out.slice(0, 3); // 最多两到三行
      }

      function drawSegment(startAngle, endAngle, color) {
        const cx = canvas.width / devicePixelRatio / 2;
        const cy = canvas.height / devicePixelRatio / 2;
        const radius = Math.min(canvas.width, canvas.height) / devicePixelRatio / 2 - 10;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function drawTextOnSegment(centerAngle, label, colorIndex) {
        const scale = devicePixelRatio;
        const size = canvas.width / scale;
        const cx = size / 2;
        const cy = size / 2;
        const radius = size / 2 - 10;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(centerAngle);

        // 文字尽量保持水平
        ctx.rotate(Math.PI / 2);

        const maxChars = label.length > 14 ? 7 : 10;
        const lines = splitTextForArc(label, maxChars);

        const fontSize = label.length > 18 ? 16 : 18;
        ctx.fillStyle = "rgba(255,255,255,0.96)";
        ctx.font = `600 ${fontSize}px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const x = radius * 0.62;
        const y = 0;
        const lineHeight = fontSize * 0.95;
        const totalHeight = (lines.length - 1) * lineHeight;
        const startY = y - totalHeight / 2;

        lines.forEach((line, i) => {
          ctx.fillText(line, x, startY + i * lineHeight);
        });

        ctx.restore();
      }

      function drawWheel() {
        const N = options.length + 1; // + wildcard
        if (N <= 1) return;

        // Resize canvas to match the displayed size
        const rect = canvas.getBoundingClientRect();
        const cssSize = Math.min(rect.width, rect.height);
        const dpr = window.devicePixelRatio || 1;

        canvas.width = Math.floor(cssSize * dpr);
        canvas.height = Math.floor(cssSize * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, cssSize, cssSize);

        const size = cssSize;
        const cx = size / 2;
        const cy = size / 2;
        const radius = size / 2 - 10;
        const segAngle = (Math.PI * 2) / N;

        // subtle outer ring
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 6, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 6;
        ctx.stroke();

        for (let i = 0; i < N; i++) {
          const startAngle = -Math.PI / 2 + i * segAngle;
          const endAngle = startAngle + segAngle;

          const color = COLORS[i % COLORS.length];
          drawSegment(startAngle, endAngle, color);

          const centerAngle = startAngle + segAngle / 2;
          const label = i < options.length ? options[i] : WILDCARD_LABEL;
          drawTextOnSegment(centerAngle, label, i);
        }

        // small center shading
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.32, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fill();

        // draw segment separators highlight
        for (let i = 0; i < N; i++) {
          const angle = -Math.PI / 2 + i * segAngle;
          const x1 = cx + Math.cos(angle) * (radius * 0.2);
          const y1 = cy + Math.sin(angle) * (radius * 0.2);
          const x2 = cx + Math.cos(angle) * (radius * 0.98);
          const y2 = cy + Math.sin(angle) * (radius * 0.98);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      }

      function updateLastResultDisplay() {
        lastResultEl.textContent = lastWinnerLabel || "—";
        const canSpin = options.length > 0 && !isSpinning;
        spinBtn.disabled = !canSpin;
      }

      function pickWinnerIndexByProbability() {
        const M = options.length;
        const N = M + 1;
        const wildcardIndex = N - 1;

        const r = Math.random();
        if (r < WILDCARD_PROB) return wildcardIndex;

        // 99% evenly split among M options
        const r2 = (r - WILDCARD_PROB) / (1 - WILDCARD_PROB); // [0,1)
        const optIndex = Math.min(M - 1, Math.floor(r2 * M));
        return optIndex;
      }

      function getLabelByIndex(idx) {
        return idx < options.length ? options[idx] : WILDCARD_LABEL;
      }

      function spinToWinner(winnerIndex) {
        const N = options.length + 1;
        const segDeg = 360 / N;

        // 讓「指針(12點)」對準「該段的中心」
        // 依照我們畫段的起始角：segment 0 從 12點開始（-90度），因此段中心在 (idx + 0.5) * segDeg
        const rotationDeg = -((winnerIndex + 0.5) * segDeg); // 絕對角度模數的目標

        const targetMod = normalizeDeg(rotationDeg);
        const currentMod = normalizeDeg(currentRotationDeg);

        // 隨機圈數 + 將模數調到目標，確保精準落在指定段
        const spins = 6 + Math.floor(Math.random() * 4); // 6~9圈
        const additional = spins * 360 + (targetMod - currentMod);
        const newRotation = currentRotationDeg + additional;

        rotator.classList.add("spin-transition");
        // 強制重排，確保 transition 生效
        void rotator.offsetWidth;
        rotator.style.transform = `rotate(${newRotation}deg)`;

        return newRotation;
      }

      function showWinnerByIndex(winnerIndex) {
        const label = getLabelByIndex(winnerIndex);
        winnerText.textContent = label;
        lastWinnerLabel = label;
        localStorage.setItem(STORAGE_LAST_WINNER_KEY, lastWinnerLabel);
        updateLastResultDisplay();
        showModal(label);
      }

      function tryPickNonRepeatWinnerIndex(maxAttempts = 30) {
        if (!lastWinnerLabel) return pickWinnerIndexByProbability();

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          const idx = pickWinnerIndexByProbability();
          const label = getLabelByIndex(idx);
          if (label !== lastWinnerLabel) return idx;
        }

        // 理论上很少会触发：如果所有段都一样（比如只剩一个有效选项且恰好同标签）
        return pickWinnerIndexByProbability();
      }

      spinBtn.addEventListener("click", () => {
        if (isSpinning) return;
        if (options.length === 0) return;

        isSpinning = true;
        spinBtn.disabled = true;

        // pick winner first, then rotate to land on it
        const winnerIndex = tryPickNonRepeatWinnerIndex(40);

        const newRotation = spinToWinner(winnerIndex);

        // 监听 transition end：动画结束显示结果
        const onDone = (e) => {
          if (e.propertyName !== "transform") return;
          rotator.classList.remove("spin-transition");
          rotator.removeEventListener("transitionend", onDone);
          currentRotationDeg = newRotation;
          isSpinning = false;
          showWinnerByIndex(winnerIndex);
          updateLastResultDisplay();
        };

        rotator.addEventListener("transitionend", onDone);
      });

      addForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const label = String(newOptionInput.value || "").trim();
        if (!label) return;

        // 去重（避免轮盘段数变多造成阅读困难）
        if (options.some((x) => x === label)) {
          newOptionInput.value = "";
          return;
        }

        options.push(label);
        saveOptions();
        renderOptions();
        drawWheel();
        updateLastResultDisplay();
        newOptionInput.value = "";
      });

      resetDefaultsBtn.addEventListener("click", () => {
        options = DEFAULT_OPTIONS.slice();
        saveOptions();
        renderOptions();
        // 重置旋转状态，避免段数变化导致角度错位
        currentRotationDeg = 0;
        rotator.classList.remove("spin-transition");
        rotator.style.transform = "rotate(0deg)";
        drawWheel();
        updateLastResultDisplay();
      });

      // 初始化
      options = loadOptions();
      renderOptions();
      drawWheel();
      updateLastResultDisplay();

      // 适配尺寸变化（例如横竖屏切换）
      let resizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => drawWheel(), 120);
      });
    </script>
  </body>
</html>
